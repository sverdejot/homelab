---
apiVersion: v1
kind: Namespace
metadata:
  name: openclaw
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: openclaw
  name: openclaw-pvc
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: openclaw
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "mkdir -p /home/node/.openclaw/auth-profile-secrets && chown -R 1000:1000 /home/node/.openclaw",
            ]
          volumeMounts:
            - name: openclaw-pvc
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: Always
          command:
            - node
            - openclaw.mjs
            - gateway
            - --allow-unconfigured
            - --bind
            - lan
            - --port
            - "18789"
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_HOME
              value: /home/node
            - name: OPENCLAW_STATE_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_CONFIG_PATH
              value: /home/node/.openclaw/openclaw.json
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_WORKSPACE_DIR
              value: /home/node/.openclaw/workspace
            - name: OPENCLAW_DISABLE_BONJOUR
              value: "1"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: gateway-token
            - name: OPENCLAW_AUTH_PROFILE_SECRET_DIR
              value: /home/node/.config/openclaw
          envFrom:
            - secretRef:
                name: openclaw-secret
                optional: false
          ports:
            - containerPort: 18789
              name: gateway
            - containerPort: 18790
              name: bridge
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - mountPath: /home/node/.openclaw
              name: openclaw-pvc
            - mountPath: /home/node/.config/openclaw
              name: openclaw-pvc
              subPath: auth-profile-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: openclaw-pvc
          persistentVolumeClaim:
            claimName: openclaw-pvc
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: openclaw
  name: openclaw-svc
  namespace: openclaw
spec:
  type: ClusterIP
  ports:
    - port: 18789
      targetPort: 18789
      name: gateway
    - port: 18790
      targetPort: 18790
      name: bridge
  selector:
    app: openclaw
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-ingress
  namespace: openclaw
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/websocket-services: openclaw-svc
spec:
  ingressClassName: nginx
  rules:
    - host: openclaw.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw-svc
                port:
                  number: 18789
