---
apiVersion: v1
kind: Namespace
metadata:
  name: ollama
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ollama
  namespace: ollama
  labels:
    kubernetes.io/service-name: ollama
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.1.233
ports:
  - port: 11434
    protocol: TCP
