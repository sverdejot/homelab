authentik:
  postgresql:
    host: authentik-postgres.authentik
    name: authentik
    user: postgres
    password: file:///postgres-creds/postgres-password

redis:
  enabled: true

bootstrap:
  password: h0m3l4b!

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: certificate-issuer
    hosts:
      - identity.homelab.local
    tls:
      - secretName: identity-homelab-local-tls
        hosts:
          - identity.homelab.local
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secret-key
          key: secretkey
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-postgres-auth
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true

worker:
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secret-key
          key: secretkey
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-postgres-auth
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true
