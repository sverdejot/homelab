name: Build RPi images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  nodes:
    strategy:
      fail-fast: false
      matrix:
        node: [homelab-0, homelab-1, homelab-2, homelab-3]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Build SD image
        run: mise run build-node ${{ matrix.node }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.node }}.img.zst

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.node }}.img.zst
            ${{ matrix.node }}.img.zst.sha256

      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.node }}
          path: |
            ${{ matrix.node }}.img.zst
            ${{ matrix.node }}.img.zst.sha256
          retention-days: 7

  installer:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Build installer image
        run: mise run build-installer

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: installer-rpi5.img.zst

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer-rpi5.img.zst
            installer-rpi5.img.zst.sha256

      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: installer-rpi5
          path: |
            installer-rpi5.img.zst
            installer-rpi5.img.zst.sha256
          retention-days: 7
